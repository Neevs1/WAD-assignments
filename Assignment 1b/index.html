<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>User Registration</title>
  <style>
    body { font-family: sans-serif; max-width: 540px; margin: 40px auto; padding: 0 16px; color: #222; }
    h1 { font-size: 1.4rem; margin-bottom: 4px; }
    p.sub { color: #666; font-size: 0.9rem; margin-bottom: 20px; }

    nav { display: flex; gap: 8px; margin-bottom: 24px; }
    nav button {
      padding: 8px 20px; border: 1px solid #ccc; border-radius: 6px;
      background: #fff; cursor: pointer; font-size: 0.9rem;
    }
    nav button.active { background: #2563eb; color: #fff; border-color: #2563eb; }

    .page { display: none; }
    .page.active { display: block; }

    label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 4px; margin-top: 14px; }
    input, select {
      width: 100%; padding: 9px 10px; border: 1px solid #ccc;
      border-radius: 6px; font-size: 0.95rem; box-sizing: border-box;
    }
    input:focus, select:focus { outline: none; border-color: #2563eb; }
    input.err, select.err { border-color: #dc2626; }
    .errmsg { color: #dc2626; font-size: 0.78rem; margin-top: 3px; display: none; }
    .errmsg.show { display: block; }

    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    button.submit {
      margin-top: 20px; width: 100%; padding: 11px;
      background: #2563eb; color: #fff; border: none;
      border-radius: 6px; font-size: 1rem; cursor: pointer;
    }
    button.submit:hover { background: #1d4ed8; }
    button.submit:disabled { opacity: 0.6; cursor: not-allowed; }

    #toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: #166534; color: #fff; padding: 10px 22px;
      border-radius: 6px; font-size: 0.9rem; display: none;
    }
    #toast.error { background: #991b1b; }

    /* List page */
    .list-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .list-top h2 { font-size: 1.1rem; }
    #searchInput { width: 100%; padding: 8px 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 0.9rem; margin-bottom: 16px; box-sizing: border-box; }

    table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    thead th { text-align: left; padding: 8px 10px; background: #f3f4f6; border-bottom: 1px solid #e5e7eb; }
    tbody td { padding: 8px 10px; border-bottom: 1px solid #f0f0f0; }
    tbody tr:hover { background: #fafafa; }
    .del-btn { background: none; border: none; cursor: pointer; color: #dc2626; font-size: 1rem; padding: 0; }

    .empty { text-align: center; color: #888; padding: 40px 0; font-size: 0.9rem; }
  </style>
</head>
<body>

  <h1>User Registration</h1>
  <p class="sub">Register users and view the list.</p>

  <nav>
    <button class="active" onclick="switchTab('register', this)">Register</button>
    <button onclick="switchTab('list', this)">User List</button>
  </nav>

  <!-- REGISTER -->
  <div id="page-register" class="page active">
    <form id="regForm" novalidate>

      <div class="row">
        <div>
          <label>First Name</label>
          <input id="fname" placeholder="John"/>
          <div class="errmsg" id="e-fname">Required</div>
        </div>
        <div>
          <label>Last Name</label>
          <input id="lname" placeholder="Doe"/>
          <div class="errmsg" id="e-lname">Required</div>
        </div>
      </div>

      <label>Email</label>
      <input id="email" type="email" placeholder="john@example.com"/>
      <div class="errmsg" id="e-email">Enter a valid email</div>

      <label>Phone</label>
      <input id="phone" placeholder="+91 98765 43210"/>
      <div class="errmsg" id="e-phone">Min 7 digits required</div>

      <div class="row">
        <div>
          <label>Age</label>
          <input id="age" type="number" placeholder="25"/>
          <div class="errmsg" id="e-age">Age 1â€“120</div>
        </div>
        <div>
          <label>Gender</label>
          <select id="gender">
            <option value="">Selectâ€¦</option>
            <option>Male</option>
            <option>Female</option>
            <option>Non-binary</option>
            <option>Prefer not to say</option>
          </select>
          <div class="errmsg" id="e-gender">Required</div>
        </div>
      </div>

      <label>City</label>
      <input id="city" placeholder="Mumbai"/>
      <div class="errmsg" id="e-city">Required</div>

      <button type="submit" class="submit" id="submitBtn">Register</button>
    </form>
  </div>

  <!-- LIST -->
  <div id="page-list" class="page">
    <div class="list-top">
      <h2>Registered Users</h2>
      <span id="userCount" style="font-size:0.85rem;color:#555;"></span>
    </div>
    <input id="searchInput" placeholder="Search by name, email or cityâ€¦" oninput="renderList()"/>
    <div id="listContainer"></div>
  </div>

  <div id="toast"></div>

<script>
  const KEY = 'reg_users';
  const getUsers  = () => { try { return JSON.parse(localStorage.getItem(KEY)) || []; } catch { return []; } };
  const saveUsers = u => localStorage.setItem(KEY, JSON.stringify(u));

  /* AJAX POST via XMLHttpRequest */
  function ajaxPost(url, data) {
    return new Promise((resolve, reject) => {
      const xhr = new XMLHttpRequest();
      xhr.open('POST', url, true);
      xhr.setRequestHeader('Content-Type', 'application/json');
      xhr.timeout = 5000;
      xhr.onload  = () => xhr.status < 300 ? resolve() : reject();
      xhr.onerror = xhr.ontimeout = () => resolve(); // graceful fallback
      xhr.send(JSON.stringify(data));
    });
  }

  /* Validation */
  function validate() {
    let ok = true;
    const rules = [
      ['fname',  v => v.length > 0,                         'Required'],
      ['lname',  v => v.length > 0,                         'Required'],
      ['email',  v => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v), 'Valid email required'],
      ['phone',  v => /^\+?[\d\s\-]{7,}$/.test(v),          'Min 7 digits'],
      ['age',    v => v !== '' && +v >= 1 && +v <= 120,      'Age 1â€“120'],
      ['gender', v => v !== '',                              'Required'],
      ['city',   v => v.length > 0,                         'Required'],
    ];
    rules.forEach(([id, fn, msg]) => {
      const el  = document.getElementById(id);
      const em  = document.getElementById('e-' + id);
      const val = el.value.trim();
      const pass = fn(val);
      el.classList.toggle('err', !pass);
      if (em) { em.textContent = msg; em.classList.toggle('show', !pass); }
      if (!pass) ok = false;
    });
    return ok;
  }

  /* Submit */
  document.getElementById('regForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    if (!validate()) return;

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = 'Registeringâ€¦';

    const user = {
      id:        Date.now(),
      firstName: document.getElementById('fname').value.trim(),
      lastName:  document.getElementById('lname').value.trim(),
      email:     document.getElementById('email').value.trim(),
      phone:     document.getElementById('phone').value.trim(),
      age:       +document.getElementById('age').value,
      gender:    document.getElementById('gender').value,
      city:      document.getElementById('city').value.trim(),
    };

    try {
      await ajaxPost('https://jsonplaceholder.typicode.com/posts', user);
      const users = getUsers();
      users.push(user);
      saveUsers(users);
      showToast('User registered!', false);
      this.reset();
      document.querySelectorAll('input, select').forEach(el => el.classList.remove('err'));
      document.querySelectorAll('.errmsg').forEach(em => em.classList.remove('show'));
    } catch {
      showToast('Registration failed.', true);
    }

    btn.disabled = false;
    btn.textContent = 'Register';
  });

  /* Render list */
  function renderList() {
    const q     = document.getElementById('searchInput').value.toLowerCase();
    const users = getUsers().filter(u =>
      `${u.firstName} ${u.lastName} ${u.email} ${u.city}`.toLowerCase().includes(q)
    ).reverse();

    document.getElementById('userCount').textContent = getUsers().length + ' user(s)';

    const cont = document.getElementById('listContainer');
    if (!users.length) {
      cont.innerHTML = `<div class="empty">${q ? 'No matches found.' : 'No users yet.'}</div>`;
      return;
    }

    cont.innerHTML = `
      <table>
        <thead><tr>
          <th>Name</th><th>Email</th><th>City</th><th>Age</th><th>Gender</th><th></th>
        </tr></thead>
        <tbody>
          ${users.map(u => `
            <tr>
              <td>${u.firstName} ${u.lastName}</td>
              <td>${u.email}</td>
              <td>${u.city}</td>
              <td>${u.age}</td>
              <td>${u.gender}</td>
              <td><button class="del-btn" onclick="deleteUser(${u.id})" title="Delete">âś•</button></td>
            </tr>`).join('')}
        </tbody>
      </table>`;
  }

  function deleteUser(id) {
    saveUsers(getUsers().filter(u => u.id !== id));
    renderList();
    showToast('User removed.', false);
  }

  /* Tabs */
  function switchTab(tab, btn) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.getElementById('page-' + tab).classList.add('active');
    btn.classList.add('active');
    if (tab === 'list') renderList();
  }

  /* Toast */
  function showToast(msg, isErr) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = isErr ? 'error' : '';
    t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 3000);
  }
</script>
</body>
</html>
